<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student-registration-form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
        <form action="" class="form">
            <h1>
                Student registration
            </h1>
           <div class="firstname">
          <label for="">first Name</label>
            <input type="text" name="first" placeholder="Entre the first name" class="size">
             </div> 
             <div class="secname">

                 <label for="">last Name</label>
                 <input type="text" name="last-name" placeholder="Enter the last name" class="size ">
                </div>
                <div class="mail">

                    <label for="">Email</label>
                    <input type="email" name="mail" placeholder="Enter email" class="size">
                </div>
                <div class="pass">

                    <label for="">password</label>
                    <input type="password" placeholder="Enter password" name="pass" class="size">
                </div>
                <div class="gender">

                    <label for="">gender :</label>
                    <input type="radio" name="gender" value="male">male
                    <input type="radio" name="gender" value="female">female
                </div>
                <div class="course">

                    <label for="">course :</label>
                    <select name="" id="">
                        <option value="">select
                        </option>
                        <option value="">BCA</option>
                        <option value="">BE</option>
                        <option value="">Btech</option>
                    </select>
                </div>
                <div class="skill">

                    <label for="">Skills :</label>
                    <input type="checkbox" name="skill" id="">HTML
                    <input type="checkbox" name="skill" id="">CSS
                    <input type="checkbox" name="" id="">JS
                    <input type="checkbox" name="" id="">Node
                </div>
                

                    <label for="">description : </label>
                    <textarea name="" id="bbox" cols="40" rows="5" placeholder="Enter the description"></textarea>
               
        <button class="btn">register</button>
    </form>
    </div>
</div>
</body>
</html>
